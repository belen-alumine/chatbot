# ===== DATABASE =====
spring.datasource.url=jdbc:postgresql://localhost:5432/ChatBot
spring.datasource.username=postgres
spring.datasource.password=Hiersonne1

# ===== JPA/HIBERNATE =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===== LOGGING - Silenciar Hibernate =====
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.orm.jdbc.extract=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
logging.level.org.hibernate.resource.transaction=OFF
logging.level.org.hibernate.engine.jdbc.internal.JdbcResourceRegistry=OFF
logging.level.org.hibernate.id.enhanced=OFF

logging.level.org.springdoc=DEBUG

# ===== LOGGING - Tu app =====
logging.level.com.example.chatbot=ERROR

# ===== SERVER =====
server.port=6099
